name: CI

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: "22"
          - os: ubuntu-latest
            node: "24"
          - os: windows-latest
            node: "24"
          - os: macos-latest
            node: "24"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        if: ${{ hashFiles('vitest.test.browser.config.ts', 'playwright.config.*') != '' }}
        run: npx playwright install chromium

      - name: Format check
        run: npm run fmt --if-present -- --check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Type checks
        run: |
          npm run typecheck --if-present
          npm run test:types --if-present
